<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExamGen - 试卷生成器</title>
  <link rel="stylesheet" href="/static/style.css?v={{ version }}">
</head>
<body>
  <div class="container">
    <div class="page-title">
      <div class="logo">&#128221;</div>
      <h1>ExamGen</h1>
      <p>从 Markdown 生成离线 HTML 试卷</p>
    </div>

    <!-- 三步引导 -->
    <div class="steps">
      <div class="step active" id="step1">
        <span class="step-num">1</span>
        <span class="step-label">编写 .md</span>
      </div>
      <div class="step-line"></div>
      <div class="step" id="step2">
        <span class="step-num">2</span>
        <span class="step-label">上传文件</span>
      </div>
      <div class="step-line"></div>
      <div class="step" id="step3">
        <span class="step-num">3</span>
        <span class="step-label">下载试卷</span>
      </div>
    </div>

    <div class="card">
      <!-- 模板提示 -->
      <div class="template-hint">
        <span>&#128161;</span>
        <span>首次使用？<a href="#" id="downloadTemplate">下载示例模板</a> 参考格式</span>
      </div>

      <!-- 拖拽上传区 -->
      <div class="drop-zone" id="dropZone">
        <div class="drop-zone-icon">&#128196;</div>
        <div class="drop-zone-text">
          拖拽 .md 文件到此处，或 <strong id="browseLink">点击选择文件</strong>
        </div>
        <input type="file" class="file-input" id="fileInput" accept=".md,.markdown">
      </div>

      <!-- 已选文件信息 -->
      <div class="file-info" id="fileInfo">
        <span class="file-info-name" id="fileName"></span>
        <button class="file-info-remove" id="fileRemove" title="移除文件">&times;</button>
      </div>

      <!-- 可选参数 -->
      <button class="params-toggle" id="paramsToggle">
        <span class="arrow">&#9654;</span> 可选参数
      </button>
      <div class="params-panel" id="paramsPanel">
        <div class="form-row">
          <label for="titleInput">试卷标题覆盖</label>
          <input type="text" id="titleInput" placeholder="留空则使用 .md 中的标题">
        </div>
        <div class="form-row-inline">
          <div class="form-row">
            <label for="timeInput">考试时间（分钟）</label>
            <input type="number" id="timeInput" placeholder="留空则使用默认值" min="1">
          </div>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="shuffleCheck">
          <label for="shuffleCheck">随机打乱题目顺序</label>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="optionShuffleCheck">
          <label for="optionShuffleCheck">随机打乱选项顺序</label>
        </div>
      </div>

      <!-- 生成按钮 -->
      <button class="btn-generate" id="generateBtn">生成并下载试卷</button>

      <!-- 状态提示 -->
      <div class="status" id="statusArea"></div>
    </div>

    <!-- 预览弹窗 -->
    <div class="preview-overlay hidden" id="previewOverlay">
      <div class="preview-modal">
        <div class="preview-header">
          <h3>试卷预览</h3>
          <button class="preview-close" id="previewClose">&times;</button>
        </div>
        <div class="preview-body" id="previewBody"></div>
        <div class="preview-actions">
          <button class="btn btn-secondary" id="previewCancel">取消</button>
          <button class="btn btn-primary" id="previewConfirm">确认并下载</button>
        </div>
      </div>
    </div>

    <div class="footer">ExamGen v{{ version }}</div>
  </div>

  <script>
    /* ── DOM ─────────────────────────────────────────────── */
    var dropZone      = document.getElementById("dropZone");
    var fileInput     = document.getElementById("fileInput");
    var browseLink    = document.getElementById("browseLink");
    var fileInfo      = document.getElementById("fileInfo");
    var fileName      = document.getElementById("fileName");
    var fileRemove    = document.getElementById("fileRemove");
    var paramsToggle  = document.getElementById("paramsToggle");
    var paramsPanel   = document.getElementById("paramsPanel");
    var generateBtn   = document.getElementById("generateBtn");
    var statusArea    = document.getElementById("statusArea");
    var selectedFile  = null;
    var lastBlob      = null;
    var lastFname     = "exam.html";

    // 步骤元素
    var step1 = document.getElementById("step1");
    var step2 = document.getElementById("step2");
    var step3 = document.getElementById("step3");

    // 预览
    var previewOverlay = document.getElementById("previewOverlay");
    var previewBody    = document.getElementById("previewBody");
    var previewClose   = document.getElementById("previewClose");
    var previewCancel  = document.getElementById("previewCancel");
    var previewConfirm = document.getElementById("previewConfirm");

    /* ── 文件选择 ────────────────────────────────────────── */
    browseLink.addEventListener("click", function (e) {
      e.stopPropagation();
      fileInput.click();
    });

    dropZone.addEventListener("click", function () { fileInput.click(); });
    dropZone.addEventListener("dragover", function (e) {
      e.preventDefault();
      dropZone.classList.add("dragover");
    });
    dropZone.addEventListener("dragleave", function () { dropZone.classList.remove("dragover"); });
    dropZone.addEventListener("drop", function (e) {
      e.preventDefault();
      dropZone.classList.remove("dragover");
      var files = e.dataTransfer.files;
      if (files.length > 0) setFile(files[0]);
    });
    fileInput.addEventListener("change", function () {
      if (fileInput.files.length > 0) setFile(fileInput.files[0]);
    });
    fileRemove.addEventListener("click", function () { clearFile(); });

    function setFile(file) {
      if (!file.name.match(/\.md$/i) && !file.name.match(/\.markdown$/i)) {
        showStatus("请选择 .md 文件", "error");
        return;
      }
      selectedFile = file;
      fileName.textContent = file.name + " (" + formatSize(file.size) + ")";
      fileInfo.classList.add("show");
      hideStatus();
      setStep(2);
    }

    function clearFile() {
      selectedFile = null;
      fileInput.value = "";
      fileInfo.classList.remove("show");
      hideStatus();
      setStep(1);
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / 1024 / 1024).toFixed(1) + " MB";
    }

    function setStep(n) {
      step1.classList.toggle("active", n >= 1);
      step1.classList.toggle("done", n > 1);
      step2.classList.toggle("active", n === 2);
      step2.classList.toggle("done", n > 2);
      step3.classList.toggle("active", n === 3);
    }

    /* ── 参数面板 ────────────────────────────────────────── */
    paramsToggle.addEventListener("click", function () {
      paramsToggle.classList.toggle("open");
      paramsPanel.classList.toggle("show");
    });

    /* ── 模板下载 ────────────────────────────────────────── */
    document.getElementById("downloadTemplate").addEventListener("click", function (e) {
      e.preventDefault();
      fetch('/api/template')
        .then(function (r) { return r.text(); })
        .then(function (template) {
          var blob = new Blob([template], { type: "text/markdown" });
          var url = URL.createObjectURL(blob);
          var a = document.createElement("a");
          a.href = url;
          a.download = "exam-template.md";
          a.click();
          URL.revokeObjectURL(url);
        })
        .catch(function () {
          showStatus("无法加载模板，请检查网络", "error");
        });
    });

    /* ── 提交生成（先预览） ─────────────────────────────── */
    generateBtn.addEventListener("click", function () {
      if (!selectedFile) {
        showStatus("请先选择 .md 文件", "error");
        return;
      }
      showStatus("正在生成试卷…", "loading");
      generateBtn.disabled = true;

      var formData = new FormData();
      formData.append("file", selectedFile);
      var title = document.getElementById("titleInput").value.trim();
      if (title) formData.append("title", title);
      var time = document.getElementById("timeInput").value.trim();
      if (time) formData.append("time", time);
      if (document.getElementById("shuffleCheck").checked) formData.append("shuffle", "1");
      if (document.getElementById("optionShuffleCheck").checked) formData.append("option_shuffle", "1");

      fetch("/generate", { method: "POST", body: formData })
        .then(function (resp) {
          if (!resp.ok) {
            return resp.json().then(function (data) {
              if (data && data.message) {
                var msg = '<div class="error-title">' + escapeHTML(data.message) + '</div>';
                if (data.field) {
                  msg += '<div class="error-field">出错的字段/位置：<code>' + escapeHTML(data.field) + '</code></div>';
                }
                if (data.suggestion) {
                  msg += '<div class="error-suggestion">' + escapeHTML(data.suggestion) + '</div>';
                }
                throw new Error(msg);
              }
              return resp.text().then(function (text) { throw new Error(text || "服务器返回错误 (" + resp.status + ")"); });
            });
          }
          var cd = resp.headers.get("Content-Disposition") || "";
          var match = cd.match(/filename="?([^";\n]+)"?/);
          lastFname = match ? match[1] : "exam.html";
          return resp.blob().then(function (blob) {
            lastBlob = blob;
            return blob;
          });
        })
        .then(function (blob) {
          // 读取 HTML 内容，提取预览信息
          return blob.text().then(function (html) {
            showPreviewInfo(html);
            hideStatus();
            setStep(3);
          });
        })
        .catch(function (err) {
          statusArea.innerHTML = '<div class="error-block">' + err.message + '</div>';
          statusArea.className = "status show error";
        })
        .finally(function () {
          generateBtn.disabled = false;
        });
    });

    /* ── 预览信息提取 ───────────────────────────────────── */
    function showPreviewInfo(html) {
      // 提取 title
      var titleMatch = html.match(/<title>(.*?)<\/title>/);
      var title = titleMatch ? titleMatch[1] : "未知试卷";

      // 提取 EXAM_DATA
      var dataMatch = html.match(/const EXAM_DATA = (\[[\s\S]*?\]);/);
      var questions = [];
      if (dataMatch) {
        try { questions = JSON.parse(dataMatch[1]); } catch (e) {}
      }

      // 类型统计
      var counts = { single: 0, multiple: 0, judge: 0, fill: 0, essay: 0 };
      var labels = { single: "单选", multiple: "多选", judge: "判断", fill: "填空", essay: "简答" };
      for (var i = 0; i < questions.length; i++) {
        var t = questions[i].qtype;
        if (counts[t] !== undefined) counts[t]++;
      }

      var statsHtml = '<div class="preview-title">' + escapeHTML(title) + '</div>';
      statsHtml += '<div class="preview-stats">共 <strong>' + questions.length + '</strong> 道题</div>';
      statsHtml += '<div class="preview-types">';
      var types = ["single", "multiple", "judge", "fill", "essay"];
      for (var j = 0; j < types.length; j++) {
        var t = types[j];
        if (counts[t] > 0) {
          statsHtml += '<span class="type-badge type-' + t + '">' + labels[t] + ' x' + counts[t] + '</span>';
        }
      }
      statsHtml += '</div>';

      // 分区
      var sections = [];
      for (var k = 0; k < questions.length; k++) {
        if (questions[k].section && sections.indexOf(questions[k].section) === -1) {
          sections.push(questions[k].section);
        }
      }
      if (sections.length > 0) {
        statsHtml += '<div class="preview-sections">';
        for (var m = 0; m < sections.length; m++) {
          statsHtml += '<div class="preview-section-item">' + escapeHTML(sections[m]) + '</div>';
        }
        statsHtml += '</div>';
      }

      previewBody.innerHTML = statsHtml;
      previewOverlay.classList.remove("hidden");
    }

    function escapeHTML(str) {
      var div = document.createElement("div");
      div.appendChild(document.createTextNode(str));
      return div.innerHTML;
    }

    /* ── 预览弹窗交互 ────────────────────────────────────── */
    previewClose.addEventListener("click", function () { previewOverlay.classList.add("hidden"); });
    previewCancel.addEventListener("click", function () { previewOverlay.classList.add("hidden"); });
    previewOverlay.addEventListener("click", function (e) {
      if (e.target === previewOverlay) previewOverlay.classList.add("hidden");
    });
    previewConfirm.addEventListener("click", function () {
      previewOverlay.classList.add("hidden");
      // 触发下载
      if (lastBlob) {
        var url = URL.createObjectURL(lastBlob);
        var a = document.createElement("a");
        a.href = url;
        a.download = lastFname;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showStatus("下载完成！", "success");
      }
    });

    /* ── 状态提示 ────────────────────────────────────────── */
    function showStatus(msg, type) {
      statusArea.textContent = msg;
      statusArea.className = "status show " + type;
    }
    function hideStatus() {
      statusArea.className = "status";
    }
  </script>
</body>
</html>

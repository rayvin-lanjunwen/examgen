<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ meta.title }}</title>
  <style>
    {{ style_content }}
  </style>
</head>
<body>
  <div class="exam-container">
    <!-- 头部：试卷信息 -->
    <header class="exam-header">
      <h1 class="exam-title">{{ meta.title }}</h1>
      <div class="exam-info">
        {% if meta.subject %}<span class="info-item">科目：{{ meta.subject }}</span>{% endif %}
        {% if meta.time %}<span class="info-item">考试时间：<span id="countdown">{{ meta.time }}</span> 分钟</span>{% endif %}
        {% if meta.total_score %}<span class="info-item">总分：{{ meta.total_score }} 分</span>{% endif %}
        {% if meta.passing_score %}<span class="info-item">及格分：{{ meta.passing_score }} 分</span>{% endif %}
      </div>
    </header>

    <!-- 题目列表，由 JS 动态渲染 -->
    <div id="questions-container"></div>

    <!-- 得分区域 -->
    <div id="score-area" class="score-area hidden">
      <h2>考试结果</h2>
      <p id="score-display"></p>
      <div id="pass-status"></div>
    </div>

    <!-- 操作按钮 -->
    <div class="exam-actions">
      <button id="submit-btn" class="btn btn-primary">提交答卷</button>
      <button id="reset-btn" class="btn btn-secondary hidden">重新作答</button>
    </div>
  </div>

  <script>
    const EXAM_DATA = {{ questions | tojson | safe }};
    const EXAM_META = {{ meta_dict | tojson | safe }};
  </script>
  <script>
    {{ script_content }}
  </script>
</body>
</html>

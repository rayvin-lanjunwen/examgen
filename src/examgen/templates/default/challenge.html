<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ meta.title }}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.25/dist/katex.min.css" onerror="this.remove()">
  <style>
    {{ style_content | safe }}
    {{ challenge_css | safe }}
  </style>
</head>
<body data-theme="{{ theme }}">
  <div class="app-layout">

    <!-- 手机端侧栏遮罩 -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- 手机端顶部操作栏 -->
    <div class="mobile-topbar" id="mobileTopbar">
      <button class="mtb-hamburger" id="mtbHamburgerBtn">&#9776;</button>
      <span class="mtb-progress" id="mtbProgress">0/0</span>
      <button class="mtb-challenge-end" id="mtbEndBtn">结束闯关</button>
    </div>

    <!-- 顶部计时条 -->
    <div class="timer-bar" id="timerBar">
      <div class="timer-bar-inner" id="timerBarInner"></div>
    </div>

    <!-- 桌面端侧栏收起后的恢复按钮 -->
    <button class="sidebar-expand-btn hidden" id="sidebarExpandBtn" title="展开导航栏">&#9654;</button>

    <!-- 侧边导航栏 -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-icon">&#9776;</span>
        <span>题目导航</span>
        <button class="sidebar-collapse-btn" id="sidebarCollapseBtn" title="折叠/展开导航栏">&#9664;</button>
      </div>
      <div class="sidebar-progress">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <span class="progress-text" id="progressText">0/0</span>
      </div>
      <div class="nav-result hidden" id="navResult"></div>
      <ul class="nav-list" id="navList"></ul>
    </nav>

    <!-- 主内容区 -->
    <main class="main-content">
      <div class="exam-container">

        <!-- 横幅头部 -->
        <header class="exam-banner challenge-banner">
          <div class="banner-bg"></div>
          <div class="banner-content">
            <div class="challenge-mode-badge">&#9876; 闯关模式</div>
            <h1 class="exam-title">{{ meta.title }}</h1>
            <div class="exam-info">
              {% if meta.subject %}<span class="info-item"><span class="info-icon">&#128218;</span> {{ meta.subject }}</span>{% endif %}
              {% if meta.time %}<span class="info-item"><span class="info-icon">&#9200;</span> <span id="countdown">{{ meta.time }}</span> 分钟</span>{% endif %}
              <span class="info-item"><span class="info-icon">&#127942;</span> <span id="challenge-score-live">0 / {{ meta.total_score or 0 }}</span> 分</span>
            </div>
          </div>
        </header>

        <!-- 关卡进度条 -->
        <div class="challenge-progress-bar">
          <div class="challenge-progress-track">
            <div class="challenge-progress-fill" id="challengeProgressFill"></div>
          </div>
          <span class="challenge-progress-label" id="challengeProgressLabel">0 / {{ questions | length }}</span>
        </div>

        <!-- 单题显示区 -->
        <div id="questions-container"></div>

        <!-- 上一题/下一题导航 -->
        <div class="challenge-nav">
          <button id="challenge-prev-btn" class="btn btn-secondary challenge-nav-btn" disabled>&#9664; 上一题</button>
          <span class="challenge-current" id="challengeCurrent">第 1 题</span>
          <button id="challenge-next-btn" class="btn btn-secondary challenge-nav-btn">下一题 &#9654;</button>
        </div>

        <!-- 操作按钮 -->
        <div class="exam-actions">
          <button id="submit-btn" class="btn btn-primary">提交答案</button>
          <button id="retry-btn" class="btn btn-secondary hidden">重做本题</button>
          <button id="end-btn" class="btn btn-secondary">结束闯关</button>
        </div>

        <!-- 得分区域 -->
        <div id="score-area" class="score-area hidden">
          <div class="score-total" id="score-display">0 / 0 分</div>
          <div id="pass-status"></div>
          <div class="score-ring-container">
            <svg class="score-ring" viewBox="0 0 120 120">
              <defs>
                <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" style="stop-color:var(--color-primary)"/>
                  <stop offset="100%" style="stop-color:var(--color-primary-hover)"/>
                </linearGradient>
              </defs>
              <circle class="ring-bg" cx="60" cy="60" r="52"></circle>
              <circle class="ring-fill" id="ringFill" cx="60" cy="60" r="52" stroke-dasharray="0 327"></circle>
            </svg>
            <div class="score-ring-text">
              <span class="ring-percent" id="ringPercent">0%</span>
              <span class="ring-label">正确率</span>
            </div>
          </div>
          <div class="score-type-summary hidden" id="scoreTypeSummary"></div>
          <div class="review-list" id="reviewList"></div>
        </div>

      </div>
    </main>

    <!-- 右下角悬浮计时气泡（最后5分钟显示） -->
    <div class="timer-bubble hidden" id="timerBubble">
      <svg class="timer-bubble-ring" viewBox="0 0 80 80">
        <circle class="bubble-bg" cx="40" cy="40" r="36"></circle>
        <circle class="bubble-fill" id="bubbleFill" cx="40" cy="40" r="36"></circle>
      </svg>
      <span class="timer-bubble-text" id="bubbleText">05:00</span>
    </div>
  </div>

  <script>
    const EXAM_DATA = {{ questions | tojson | safe }};
    const EXAM_META = {{ meta_dict | tojson | safe }};
  </script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.25/dist/katex.min.js" onerror="window._katexFailed=1"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.25/dist/contrib/auto-render.min.js" onerror="window._katexFailed=1"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.12/marked.min.js" onerror="window._markedFailed=1"></script>
  <script>
    {{ script_content | safe }}
  </script>
</body>
</html>
